spring:
  application:
    name: ms-grupos
  datasource:
    # Base de datos MySQL (XAMPP)
    # Crea la BD "ms_grupos" en phpMyAdmin antes de correr el proyecto.
    url: jdbc:mysql://localhost:3306/ms_grupos
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

jwt:
  # JWT - el mismo secret que en ms-login y ms-usuarios
  secret: c2VjcmV0b011eUZ1ZXJ0ZVBhcmFDYXJkTGlua1Byb3llY3RvRHVvYzIwMjY=
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
        